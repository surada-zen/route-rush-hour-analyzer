<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Route Analysis Result</title>
  </head>
  <body>
    <h1>Mock Route Recommendation</h1>

    <p><strong>Origin:</strong> {{ origin }}</p>
    <p><strong>Destination:</strong> {{ destination }}</p>
    <p><strong>Selected Time:</strong> {{ departure_time }}</p>
    <p><strong>Travel Mode:</strong> {{ travel_mode }}</p>

    <hr />

    <p><strong>Recommended Departure:</strong> {{ recommended_time }}</p>
    <p><strong>Estimated Time Saved:</strong> {{ time_saved }}</p>
    <p><strong>Why:</strong> {{ explanation }}</p>

    <p><a href="/">Try another route</a></p>
  </body>
</html>
